<svg xmlns="http://www.w3.org/2000/svg" viewBox="126 126 772 772" role="img" aria-labelledby="title desc">
  <title id="title">AgentOS hexagon microSD logo</title>
  <desc id="desc">Transparent SVG logo with a gold bordered black hexagon and a golden microSD card labeled AgentOS.</desc>

  <defs>
    <linearGradient id="goldBorder" x1="188" y1="130" x2="836" y2="894" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE36C"/>
      <stop offset="0.34" stop-color="#F7C22F"/>
      <stop offset="0.7" stop-color="#D99A08"/>
      <stop offset="1" stop-color="#FFE06A"/>
    </linearGradient>

    <linearGradient id="goldCard" x1="360" y1="316" x2="690" y2="708" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE76F"/>
      <stop offset="0.45" stop-color="#F6C12F"/>
      <stop offset="1" stop-color="#D99508"/>
    </linearGradient>

    <linearGradient id="blackFace" x1="270" y1="220" x2="760" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1B1B"/>
      <stop offset="1" stop-color="#080909"/>
    </linearGradient>

    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Central hex badge -->
  <g filter="url(#softShadow)">
    <polygon points="512,126 842,316 842,708 512,898 182,708 182,316" fill="url(#goldBorder)"/>
    <polygon points="512,178 796,342 796,682 512,846 228,682 228,342" fill="url(#blackFace)"/>
    <polygon points="512,202 774,354 774,670 512,822 250,670 250,354" fill="none" stroke="#252727" stroke-width="10" opacity="0.55"/>
  </g>

  <!-- Golden microSD card -->
  <g filter="url(#cardShadow)">
    <path d="
      M 360 342
      Q 360 316 386 316
      L 638 316
      Q 664 316 664 342
      L 664 446
      L 700 478
      L 664 510
      L 664 552
      L 700 584
      L 664 616
      L 664 682
      Q 664 708 638 708
      L 386 708
      Q 360 708 360 682
      Z" fill="url(#goldCard)"/>
    <path d="
      M 360 342
      Q 360 316 386 316
      L 638 316
      Q 664 316 664 342
      L 664 446
      L 700 478
      L 664 510
      L 664 552
      L 700 584
      L 664 616
      L 664 682
      Q 664 708 638 708
      L 386 708
      Q 360 708 360 682
      Z" fill="none" stroke="#FFEE8A" stroke-width="4" opacity="0.55"/>

    <!-- Contact bars -->
    <rect x="398" y="364" width="22" height="76" rx="5" fill="#111313"/>
    <rect x="438" y="364" width="22" height="76" rx="5" fill="#111313"/>
    <rect x="478" y="364" width="22" height="76" rx="5" fill="#111313"/>
    <rect x="518" y="364" width="22" height="76" rx="5" fill="#111313"/>
    <rect x="558" y="364" width="22" height="76" rx="5" fill="#111313"/>
    <rect x="598" y="364" width="22" height="76" rx="5" fill="#111313"/>

    <!-- AgentOS wordmark -->
    <text x="512" y="632"
          text-anchor="middle"
          font-family="Inter, Arial, Helvetica, sans-serif"
          font-size="62"
          font-weight="800"
          letter-spacing="-3"
          fill="#151616">AgentOS</text>
  </g>
</svg>
