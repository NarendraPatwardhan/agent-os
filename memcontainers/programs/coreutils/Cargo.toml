# Manifest for crate_universe (@guest_crates) dependency resolution — the coreutils crate
# BUILDS via Bazel (rust_binary → four per-tier mcbox.wasm), not cargo. It is a STD crate built
# for wasm32-wasi (VISION §16.3): the uutils + external tools it links are std, and the
# //wasi-adapter rewrites the box's wasi_snapshot_preview1 imports to mc_sys_* afterward. The
# guests resolve from their OWN lock, separate from @crates (kernel) and @host_crates (host).
[package]
name = "coreutils"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[dependencies]
# uutils — used AS-IS (`<name>` routes to `uu_<name>::uumain` in the mcbox! list); uucore + clap
# are linked by every uu_* anyway, so the hand-written tools REUSE them for flag-parsing + help
# (no parallel CLI). Tiers are stamped by the mcbox! registration in src/main.rs.
uucore = "0.9.0"
clap = "4"
uu_base64 = "0.9.0"
# read-only uutils family (hash/checksum, base-N, text format/join, compute, misc).
uu_sha256sum = "0.9.0"
uu_sha1sum = "0.9.0"
uu_sha512sum = "0.9.0"
uu_md5sum = "0.9.0"
uu_b2sum = "0.9.0"
uu_cksum = "0.9.0"
uu_sum = "0.9.0"
uu_base32 = "0.9.0"
uu_basenc = "0.9.0"
uu_comm = "0.9.0"
uu_join = "0.9.0"
uu_paste = "0.9.0"
uu_fmt = "0.9.0"
uu_expand = "0.9.0"
uu_unexpand = "0.9.0"
uu_od = "0.9.0"
uu_factor = "0.9.0"
uu_numfmt = "0.9.0"
uu_tsort = "0.9.0"
uu_date = "0.9.0"
uu_shuf = "0.9.0"
uu_pathchk = "0.9.0"
# read-write uutils (the splitters).
uu_split = "0.9.0"
uu_csplit = "0.9.0"
# external-crate tools — ripgrep's engine for grep (in-memory search; no mmap on wasi).
grep-searcher = { version = "0.1", default-features = false }
grep-regex = "0.1"
walkdir = "2"
# sed (uutils `sed`, fetched + patched by the //MODULE.bazel http_archive) links these from
# @guest_crates; declared here (the @guest_crates manifest) so they're exposed as direct targets
# for the //third_party/sed rust_library — the coreutils crate itself doesn't use them.
fancy-regex = "0.17"
memchr = "2.7"
memmap2 = "0.9"
once_cell = "1.21"
phf = "0.13"
regex = "1.10"
tempfile = "3.10"
# crates.io external tools (each a clap CLI over a library crate, like grep): awk/jq/gzip/diff/
# file/tar/zip/unzip. Decoder-only where the encoder is unix-bound; default-features off keeps the
# wasm lean.
awk-rs = "0.1.0"
jaq-core = "2"
jaq-std = "2"
jaq-json = { version = "1", features = ["serde_json"] }
serde_json = "1"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
similar = "2"
infer = "0.16"
tar = { version = "0.4", default-features = false }
bzip2-rs = "0.1"
lzma-rs = "0.3"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
