# Manifest for crate_universe dependency resolution only — the kernel BUILDS via Bazel
# (rust_shared_library → kernel.wasm), not cargo. It lists the external crates.io deps;
# the `abi` role is filled by the generated //contracts:*_rust bindings (a Bazel dep),
# not a crate. Keep the versions in lockstep with memcontainers crates/kernel (the
# wasmi 1.0.9 + eager-mode requirement is documented in SYSTEMS.md §4.3).
[package]
name = "kernel"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
talc = "5.0.3"
# `=1.0.9` exactly: wasmi MUST run in eager compilation mode at this version — lazy
# translation charges *guest* fuel and corrupts the host on a dry-fuel resume (the
# load-bearing landmine, SYSTEMS.md §4.3). A `^` range would
# drift to 1.1.x and silently break that contract.
wasmi = { version = "=1.0.9", default-features = false }
wasmparser = { version = "=0.228.0", default-features = false, features = ["features", "validate"] }
